<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OpenMagicPointer — Setup</title>
    <link rel="stylesheet" href="setup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="dot" aria-hidden="true"></div>
        <div>
          <h1>OpenMagicPointer</h1>
          <p class="subtitle">Pick a vision-language backend and paste your credentials.</p>
        </div>
      </header>

      <div id="envBanner" class="banner" hidden></div>

      <form id="form" novalidate>
        <label class="field">
          <span class="label-text">Provider</span>
          <select id="provider" required>
            <option value="anthropic">Anthropic Claude (native SDK)</option>
            <option value="openai">OpenAI-compatible endpoint</option>
          </select>
          <span class="hint" id="providerHint"></span>
        </label>

        <label class="field" id="baseURLRow">
          <span class="label-text">Endpoint URL <span class="muted" id="baseURLOptional"></span></span>
          <input
            id="baseURL"
            type="url"
            placeholder="https://api.openai.com/v1"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="hint" id="baseURLHint"></span>
        </label>

        <label class="field">
          <span class="label-text">Model</span>
          <input
            id="model"
            type="text"
            placeholder="claude-opus-4-7"
            autocomplete="off"
            spellcheck="false"
            required
          />
          <span class="hint" id="modelHint"></span>
        </label>

        <label class="field">
          <span class="label-text">Hint frequency</span>
          <div class="slider-row">
            <span class="slider-label">Quiet</span>
            <input id="aggressiveness" type="range" min="1" max="5" step="1" value="3" />
            <span class="slider-label">Proactive</span>
          </div>
          <span class="hint" id="aggressivenessHint">Level 3: balanced — hints when idle and useful.</span>
        </label>

        <label class="field">
          <span class="label-text">API key <span class="muted">(x-api-key header)</span></span>
          <input
            id="apiKey"
            type="password"
            placeholder="sk-…"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="hint" id="apiKeyHint"></span>
        </label>

        <label class="field" id="authTokenRow">
          <span class="label-text">Auth token <span class="muted">(Bearer header — for proxies / claude-code-router)</span></span>
          <input
            id="authToken"
            type="password"
            placeholder="…"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="hint" id="authTokenHint">
            Sent as <code>Authorization: Bearer …</code>. Use this for the Anthropic SDK's
            <code>ANTHROPIC_AUTH_TOKEN</code> path — local proxies, claude-code-router, LiteLLM, etc.
          </span>
        </label>

        <div id="error" class="error" hidden></div>

        <div class="actions">
          <button id="cancel" type="button" class="ghost">Cancel</button>
          <button id="save" type="submit" class="primary">Save &amp; continue</button>
        </div>
      </form>
    </main>
    <script src="setup.js"></script>
  </body>
</html>
