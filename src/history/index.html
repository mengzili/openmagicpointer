<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hint History</title>
    <link rel="stylesheet" href="history.css" />
  </head>
  <body>
    <header>
      <h1>Hint History</h1>
      <button id="clear" class="ghost">Clear all</button>
    </header>
    <div class="dashboard">
      <section class="timeline" id="timeline">
        <p class="empty" id="empty">No hints yet. Use the app for a while and come back.</p>
      </section>
      <aside class="sidebar">
        <div class="panel">
          <h2>Categories</h2>
          <div id="categories"></div>
        </div>
        <div class="panel">
          <h2>Word Cloud</h2>
          <div id="wordcloud"></div>
        </div>
      </aside>
    </div>
    <script src="history.js"></script>
  </body>
</html>
